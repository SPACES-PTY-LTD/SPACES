$kind: http-request
url: "{{base_url}}/api/v1/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "Jane Doe",
      "email": "jane@example.com",
      "password": "password123",
      "password_confirmation": "password123"
    }
order: 1000
