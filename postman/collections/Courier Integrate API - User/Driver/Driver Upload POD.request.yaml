  Authorization: Bearer {{token}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "file_key": "{{booking_id}}.jpg",
      "file_type": "image/jpeg",
      "signed_by": "Jane Doe"
    }
order: 6000
