$kind: http-request
url: "{{base_url}}/api/v1/drivers/{{driver_uuid}}/vehicles/{{vehicle_uuid}}"
method: PATCH
headers:
  Accept: application/json
  Authorization: Bearer {{token}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "vehicle_id": "{{vehicle_id}}"
    }
order: 8000
