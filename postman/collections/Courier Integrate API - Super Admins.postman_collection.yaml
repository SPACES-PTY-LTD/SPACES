- name: Auth
  item:
  - name: Auth Login (Super Admin)
    event:
    - listen: prerequest
      script:
        id: 9248b313-0c56-4a8c-90e0-fc6f69131419
        exec:
        - ''
        type: text/javascript
        packages: []
        requests: []
    - listen: test
      script:
        id: e08c65c8-3e06-4597-ba87-6234b91aabe1
        exec:
        - "// Parse the JSON response"
        - const jsonData = pm.response.json();
        - ''
        - "// Extract token from common response locations"
        - let token = null;
        - ''
        - if (jsonData.data.token) {
        - "    token = jsonData.data.token;"
        - "}"
        - ''
        - "// Save token to environment variable"
        - if (token) {
        - '    pm.environment.set("bearer_token", token);'
        - '    console.log("Token saved to environment variable ''bearer_token''");'
        - "}"
        - ''
        - "// Test to verify token was received"
        - pm.test("Token is present in response", function () {
        - "    pm.expect(token).to.not.be.null;"
        - "    pm.expect(token).to.be.a('string');"
        - "    pm.expect(token.length).to.be.greaterThan(0);"
        - "});"
        type: text/javascript
        packages: []
        requests: []
    id: 061ee91f-0f01-464e-9650-ac803243a7dd
    request:
      method: POST
      header:
      - key: Content-Type
        value: application/json
      body:
        mode: raw
        raw: |-
          {
            "email": "super_admin@example.com",
            "password": "password1234"
          }
      url:
        raw: "{{base_url}}/api/v1/auth/login"
        host:
        - "{{base_url}}"
        path:
        - api
        - v1
        - auth
        - login
    response: []
  - name: Auth Refresh
    id: 52270e6c-81a8-4409-93f8-34ef009ecacb
    request:
